<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Retro TV Arcade</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #050510;
      overflow: hidden;
      font-family: monospace;
      color: white;
    }canvas {
  display: block;
  width: 100vw;
  height: 100vh;
  image-rendering: pixelated;
  background: #050510;
}

  </style>
</head>
<body>
  <canvas id="game"></canvas>  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");

    const GAME_WIDTH = 960;
    const GAME_HEIGHT = 540;

    let scaleX = 1;
    let scaleY = 1;

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      scaleX = canvas.width / GAME_WIDTH;
      scaleY = canvas.height / GAME_HEIGHT;
      ctx.setTransform(scaleX, 0, 0, scaleY, 0, 0);
    }

    window.addEventListener("resize", resizeCanvas);
    resizeCanvas();

    const keys = {};
    const justPressed = {};

    window.addEventListener("keydown", (e) => {
      if (!keys[e.code]) justPressed[e.code] = true;
      keys[e.code] = true;
      if (["ArrowLeft", "ArrowRight", "ArrowUp", "ArrowDown", "Space", "Enter"].includes(e.code)) {
        e.preventDefault();
      }
    });

    window.addEventListener("keyup", (e) => {
      keys[e.code] = false;
    });

    function getGamepadInput() {
      const pads = navigator.getGamepads ? navigator.getGamepads() : [];
      const pad = pads[0];
      if (!pad) return { left: false, right: false, up: false, down: false, fire: false, start: false };

      const axisX = pad.axes[0] || 0;
      const axisY = pad.axes[1] || 0;
      return {
        left: axisX < -0.25 || pad.buttons[14]?.pressed,
        right: axisX > 0.25 || pad.buttons[15]?.pressed,
        up: axisY < -0.25 || pad.buttons[12]?.pressed,
        down: axisY > 0.25 || pad.buttons[13]?.pressed,
        fire: pad.buttons[0]?.pressed || pad.buttons[1]?.pressed,
        start: pad.buttons[9]?.pressed || pad.buttons[0]?.pressed
      };
    }

    function drawText(text, x, y, size = 24, align = "left", color = "white") {
      ctx.fillStyle = color;
      ctx.font = `${size}px monospace`;
      ctx.textAlign = align;
      ctx.textBaseline = "middle";
      ctx.fillText(text, x, y);
    }

    function rectsOverlap(a, b) {
      return a.x < b.x + b.w &&
             a.x + a.w > b.x &&
             a.y < b.y + b.h &&
             a.y + a.h > b.y;
    }

    let stars = [];
    function createStars() {
      stars = [];
      for (let i = 0; i < 90; i++) {
        stars.push({
          x: Math.random() * GAME_WIDTH,
          y: Math.random() * GAME_HEIGHT,
          size: Math.random() > 0.8 ? 2 : 1,
          speed: 15 + Math.random() * 45
        });
      }
    }

    function updateStars(dt) {
      for (const star of stars) {
        star.y += star.speed * dt;
        if (star.y > GAME_HEIGHT) {
          star.y = 0;
          star.x = Math.random() * GAME_WIDTH;
        }
      }
    }

    function drawBackground() {
      ctx.fillStyle = "#050510";
      ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);

      for (const star of stars) {
        ctx.fillStyle = star.size === 2 ? "#ffffff" : "#8888ff";
        ctx.fillRect(star.x, star.y, star.size, star.size);
      }

      ctx.strokeStyle = "rgba(80, 255, 180, 0.18)";
      ctx.lineWidth = 2;
      for (let y = 0; y < GAME_HEIGHT; y += 6) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(GAME_WIDTH, y);
        ctx.stroke();
      }
    }

    const arcade = {
      state: "menu",
      selected: 0,
      games: ["SPACE INVADERS", "SNAKE", "PONG"],
      high: {
        invaders: Number(localStorage.getItem("high_invaders") || 0),
        snake: Number(localStorage.getItem("high_snake") || 0),
        pong: Number(localStorage.getItem("high_pong") || 0)
      }
    };

    function goMenu() {
      arcade.state = "menu";
    }

    function startSelectedGame() {
      if (arcade.selected === 0) startInvaders();
      if (arcade.selected === 1) startSnake();
      if (arcade.selected === 2) startPong();
    }

    function updateMenu(dt, pad) {
      updateStars(dt);
      if (justPressed.ArrowUp || justPressed.KeyW || pad.up) {
        arcade.selected = (arcade.selected + arcade.games.length - 1) % arcade.games.length;
      }
      if (justPressed.ArrowDown || justPressed.KeyS || pad.down) {
        arcade.selected = (arcade.selected + 1) % arcade.games.length;
      }
      if (justPressed.Enter || justPressed.Space || pad.fire || pad.start) startSelectedGame();
    }

    function drawMenu() {
      drawBackground();
      drawText("RETRO TV ARCADE", GAME_WIDTH / 2, 100, 56, "center", "#55ff99");
      drawText("ONE INDEX.HTML • GITHUB • VERCEL • TV BROWSER", GAME_WIDTH / 2, 155, 20, "center", "#44ddff");

      for (let i = 0; i < arcade.games.length; i++) {
        const y = 235 + i * 62;
        const selected = i === arcade.selected;
        ctx.fillStyle = selected ? "rgba(85, 255, 153, 0.18)" : "rgba(255,255,255,0.04)";
        ctx.fillRect(260, y - 28, 440, 48);
        drawText(selected ? `> ${arcade.games[i]} <` : arcade.games[i], GAME_WIDTH / 2, y - 4, 30, "center", selected ? "#ffee55" : "#ffffff");
      }

      drawText("UP/DOWN SELECT • ENTER/SPACE START • ESC MENU", GAME_WIDTH / 2, 455, 22, "center", "#ffffff");
      drawText(`HIGHS  INVADERS:${arcade.high.invaders}  SNAKE:${arcade.high.snake}  PONG:${arcade.high.pong}`, GAME_WIDTH / 2, 500, 18, "center", "#ff77dd");
    }

    const inv = {};

    function startInvaders() {
      inv.player = { x: GAME_WIDTH / 2 - 22, y: GAME_HEIGHT - 70, w: 44, h: 24, speed: 360, cooldown: 0 };
      inv.bullets = [];
      inv.enemyBullets = [];
      inv.enemies = [];
      inv.particles = [];
      inv.score = 0;
      inv.lives = 3;
      inv.level = 1;
      inv.enemyDirection = 1;
      inv.enemyStepTimer = 0;
      inv.over = false;
      createInvadersEnemies();
      arcade.state = "invaders";
    }

    function createInvadersEnemies() {
      inv.enemies = [];
      const rows = Math.min(4 + inv.level, 7);
      const cols = 10;
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          inv.enemies.push({ x: 145 + c * 66, y: 80 + r * 42, w: 34, h: 24, alive: true, type: r % 3 });
        }
      }
    }

    function invadersShoot() {
      if (inv.player.cooldown <= 0) {
        inv.bullets.push({ x: inv.player.x + inv.player.w / 2 - 3, y: inv.player.y - 12, w: 6, h: 14, speed: 520 });
        inv.player.cooldown = 0.28;
      }
    }

    function invadersExplosion(x, y, color) {
      for (let i = 0; i < 14; i++) {
        inv.particles.push({ x, y, vx: (Math.random() - 0.5) * 190, vy: (Math.random() - 0.5) * 190, life: 0.45 + Math.random() * 0.3, color });
      }
    }

    function updateInvaders(dt, pad) {
      updateStars(dt);
      if (keys.Escape) goMenu();
      if (inv.over) {
        if (justPressed.Enter || justPressed.Space || pad.fire) startInvaders();
        return;
      }

      if (keys.ArrowLeft || keys.KeyA || pad.left) inv.player.x -= inv.player.speed * dt;
      if (keys.ArrowRight || keys.KeyD || pad.right) inv.player.x += inv.player.speed * dt;
      inv.player.x = Math.max(20, Math.min(GAME_WIDTH - inv.player.w - 20, inv.player.x));

      inv.player.cooldown -= dt;
      if (keys.Space || keys.Enter || pad.fire) invadersShoot();

      for (const b of inv.bullets) b.y -= b.speed * dt;
      inv.bullets = inv.bullets.filter(b => b.y + b.h > 0);

      for (const b of inv.enemyBullets) b.y += b.speed * dt;
      inv.enemyBullets = inv.enemyBullets.filter(b => b.y < GAME_HEIGHT + 20);

      inv.enemyStepTimer += dt;
      const enemySpeed = Math.max(0.12, 0.45 - inv.level * 0.035);

      if (inv.enemyStepTimer >= enemySpeed) {
        inv.enemyStepTimer = 0;
        let edgeHit = false;
        for (const e of inv.enemies) {
          if (!e.alive) continue;
          e.x += 14 * inv.enemyDirection;
          if (e.x < 30 || e.x + e.w > GAME_WIDTH - 30) edgeHit = true;
        }
        if (edgeHit) {
          inv.enemyDirection *= -1;
          for (const e of inv.enemies) if (e.alive) e.y += 20;
        }
      }

      if (Math.random() < dt * (0.65 + inv.level * 0.15)) {
        const alive = inv.enemies.filter(e => e.alive);
        if (alive.length) {
          const shooter = alive[Math.floor(Math.random() * alive.length)];
          inv.enemyBullets.push({ x: shooter.x + shooter.w / 2 - 3, y: shooter.y + shooter.h, w: 6, h: 14, speed: 190 + inv.level * 18 });
        }
      }

      for (const b of inv.bullets) {
        for (const e of inv.enemies) {
          if (e.alive && rectsOverlap(b, e)) {
            e.alive = false;
            b.y = -999;
            inv.score += 10 * inv.level;
            invadersExplosion(e.x + e.w / 2, e.y + e.h / 2, "#55ff99");
          }
        }
      }
      inv.bullets = inv.bullets.filter(b => b.y > -100);

      for (const b of inv.enemyBullets) {
        if (rectsOverlap(b, inv.player)) {
          b.y = GAME_HEIGHT + 999;
          inv.lives--;
          invadersExplosion(inv.player.x + inv.player.w / 2, inv.player.y + inv.player.h / 2, "#ff5577");
          inv.player.x = GAME_WIDTH / 2 - inv.player.w / 2;
          if (inv.lives <= 0) endInvaders();
        }
      }

      if (inv.enemies.some(e => e.alive && e.y + e.h >= inv.player.y - 8)) endInvaders();

      if (inv.enemies.every(e => !e.alive)) {
        inv.level++;
        inv.bullets = [];
        inv.enemyBullets = [];
        inv.player.x = GAME_WIDTH / 2 - inv.player.w / 2;
        inv.enemyDirection = 1;
        createInvadersEnemies();
      }

      for (const p of inv.particles) {
        p.x += p.vx * dt;
        p.y += p.vy * dt;
        p.life -= dt;
      }
      inv.particles = inv.particles.filter(p => p.life > 0);
    }

    function endInvaders() {
      arcade.high.invaders = Math.max(arcade.high.invaders, inv.score);
      localStorage.setItem("high_invaders", String(arcade.high.invaders));
      inv.over = true;
    }

    function drawInvaderEnemy(e) {
      const colors = ["#55ff99", "#ffee55", "#ff77dd"];
      ctx.fillStyle = colors[e.type];
      ctx.fillRect(e.x + 4, e.y, e.w - 8, 6);
      ctx.fillRect(e.x, e.y + 6, e.w, 12);
      ctx.fillRect(e.x + 6, e.y + 18, 6, 6);
      ctx.fillRect(e.x + e.w - 12, e.y + 18, 6, 6);
      ctx.fillStyle = "#050510";
      ctx.fillRect(e.x + 8, e.y + 9, 5, 5);
      ctx.fillRect(e.x + e.w - 13, e.y + 9, 5, 5);
    }

    function drawInvaders() {
      drawBackground();
      for (const e of inv.enemies) if (e.alive) drawInvaderEnemy(e);

      ctx.fillStyle = "#44ddff";
      ctx.fillRect(inv.player.x, inv.player.y + 8, inv.player.w, 12);
      ctx.fillRect(inv.player.x + 10, inv.player.y, inv.player.w - 20, 12);
      ctx.fillStyle = "#ffffff";
      ctx.fillRect(inv.player.x + inv.player.w / 2 - 4, inv.player.y - 5, 8, 8);

      ctx.fillStyle = "#ffffff";
      for (const b of inv.bullets) ctx.fillRect(b.x, b.y, b.w, b.h);
      ctx.fillStyle = "#ff5577";
      for (const b of inv.enemyBullets) ctx.fillRect(b.x, b.y, b.w, b.h);

      for (const p of inv.particles) {
        ctx.fillStyle = p.color;
        ctx.globalAlpha = Math.max(0, p.life);
        ctx.fillRect(p.x, p.y, 4, 4);
        ctx.globalAlpha = 1;
      }

      drawText(`SCORE ${inv.score}`, 28, 26, 22, "left", "#ffffff");
      drawText(`HIGH ${arcade.high.invaders}`, GAME_WIDTH / 2, 26, 22, "center", "#ffdd66");
      drawText(`LIVES ${inv.lives}`, GAME_WIDTH - 28, 26, 22, "right", "#ffffff");
      drawText(`LEVEL ${inv.level}`, GAME_WIDTH / 2, 505, 18, "center", "#55ff99");

      if (inv.over) drawGameOver(inv.score, "SPACE INVADERS");
    }

    const snake = {};

    function startSnake() {
      snake.grid = 24;
      snake.cell = 18;
      snake.offsetX = (GAME_WIDTH - snake.grid * snake.cell) / 2;
      snake.offsetY = 70;
      snake.body = [{ x: 12, y: 12 }, { x: 11, y: 12 }, { x: 10, y: 12 }];
      snake.dir = { x: 1, y: 0 };
      snake.nextDir = { x: 1, y: 0 };
      snake.food = { x: 18, y: 12 };
      snake.timer = 0;
      snake.speed = 0.13;
      snake.score = 0;
      snake.over = false;
      arcade.state = "snake";
    }

    function placeSnakeFood() {
      do {
        snake.food = { x: Math.floor(Math.random() * snake.grid), y: Math.floor(Math.random() * snake.grid) };
      } while (snake.body.some(s => s.x === snake.food.x && s.y === snake.food.y));
    }

    function updateSnake(dt, pad) {
      updateStars(dt);
      if (keys.Escape) goMenu();
      if (snake.over) {
        if (justPressed.Enter || justPressed.Space || pad.fire) startSnake();
        return;
      }

      if ((justPressed.ArrowUp || justPressed.KeyW || pad.up) && snake.dir.y !== 1) snake.nextDir = { x: 0, y: -1 };
      if ((justPressed.ArrowDown || justPressed.KeyS || pad.down) && snake.dir.y !== -1) snake.nextDir = { x: 0, y: 1 };
      if ((justPressed.ArrowLeft || justPressed.KeyA || pad.left) && snake.dir.x !== 1) snake.nextDir = { x: -1, y: 0 };
      if ((justPressed.ArrowRight || justPressed.KeyD || pad.right) && snake.dir.x !== -1) snake.nextDir = { x: 1, y: 0 };

      snake.timer += dt;
      if (snake.timer < snake.speed) return;
      snake.timer = 0;
      snake.dir = snake.nextDir;

      const head = snake.body[0];
      const next = { x: head.x + snake.dir.x, y: head.y + snake.dir.y };

      if (next.x < 0 || next.x >= snake.grid || next.y < 0 || next.y >= snake.grid || snake.body.some(s => s.x === next.x && s.y === next.y)) {
        arcade.high.snake = Math.max(arcade.high.snake, snake.score);
        localStorage.setItem("high_snake", String(arcade.high.snake));
        snake.over = true;
        return;
      }

      snake.body.unshift(next);
      if (next.x === snake.food.x && next.y === snake.food.y) {
        snake.score += 10;
        snake.speed = Math.max(0.07, snake.speed - 0.002);
        placeSnakeFood();
      } else {
        snake.body.pop();
      }
    }

    function drawSnake() {
      drawBackground();
      drawText(`SNAKE  SCORE ${snake.score}`, GAME_WIDTH / 2, 35, 26, "center", "#55ff99");
      drawText(`HIGH ${arcade.high.snake}`, GAME_WIDTH - 28, 35, 20, "right", "#ffdd66");

      ctx.strokeStyle = "#44ddff";
      ctx.lineWidth = 4;
      ctx.strokeRect(snake.offsetX - 4, snake.offsetY - 4, snake.grid * snake.cell + 8, snake.grid * snake.cell + 8);

      ctx.fillStyle = "#ff5577";
      ctx.fillRect(snake.offsetX + snake.food.x * snake.cell + 2, snake.offsetY + snake.food.y * snake.cell + 2, snake.cell - 4, snake.cell - 4);

      for (let i = 0; i < snake.body.length; i++) {
        const s = snake.body[i];
        ctx.fillStyle = i === 0 ? "#ffee55" : "#55ff99";
        ctx.fillRect(snake.offsetX + s.x * snake.cell + 2, snake.offsetY + s.y * snake.cell + 2, snake.cell - 4, snake.cell - 4);
      }

      drawText("ARROWS MOVE • ESC MENU", GAME_WIDTH / 2, 515, 18, "center", "#ffffff");
      if (snake.over) drawGameOver(snake.score, "SNAKE");
    }

    const pong = {};

    function startPong() {
      pong.player = { x: 40, y: GAME_HEIGHT / 2 - 55, w: 18, h: 110, speed: 360 };
      pong.ai = { x: GAME_WIDTH - 58, y: GAME_HEIGHT / 2 - 55, w: 18, h: 110, speed: 300 };
      pong.ball = { x: GAME_WIDTH / 2, y: GAME_HEIGHT / 2, vx: 310, vy: 180, size: 14 };
      pong.playerScore = 0;
      pong.aiScore = 0;
      pong.over = false;
      arcade.state = "pong";
    }

    function resetPongBall(direction) {
      pong.ball.x = GAME_WIDTH / 2;
      pong.ball.y = GAME_HEIGHT / 2;
      pong.ball.vx = 310 * direction;
      pong.ball.vy = (Math.random() > 0.5 ? 1 : -1) * (150 + Math.random() * 80);
    }

    function updatePong(dt, pad) {
      updateStars(dt);
      if (keys.Escape) goMenu();
      if (pong.over) {
        if (justPressed.Enter || justPressed.Space || pad.fire) startPong();
        return;
      }

      if (keys.ArrowUp || keys.KeyW || pad.up) pong.player.y -= pong.player.speed * dt;
      if (keys.ArrowDown || keys.KeyS || pad.down) pong.player.y += pong.player.speed * dt;
      pong.player.y = Math.max(20, Math.min(GAME_HEIGHT - pong.player.h - 20, pong.player.y));

      const aiCenter = pong.ai.y + pong.ai.h / 2;
      if (aiCenter < pong.ball.y - 12) pong.ai.y += pong.ai.speed * dt;
      if (aiCenter > pong.ball.y + 12) pong.ai.y -= pong.ai.speed * dt;
      pong.ai.y = Math.max(20, Math.min(GAME_HEIGHT - pong.ai.h - 20, pong.ai.y));

      pong.ball.x += pong.ball.vx * dt;
      pong.ball.y += pong.ball.vy * dt;

      if (pong.ball.y < 20 || pong.ball.y + pong.ball.size > GAME_HEIGHT - 20) pong.ball.vy *= -1;

      const ballRect = { x: pong.ball.x, y: pong.ball.y, w: pong.ball.size, h: pong.ball.size };
      if (rectsOverlap(ballRect, pong.player) && pong.ball.vx < 0) {
        pong.ball.vx *= -1.08;
        pong.ball.vy += ((pong.ball.y + pong.ball.size / 2) - (pong.player.y + pong.player.h / 2)) * 4;
      }
      if (rectsOverlap(ballRect, pong.ai) && pong.ball.vx > 0) {
        pong.ball.vx *= -1.08;
        pong.ball.vy += ((pong.ball.y + pong.ball.size / 2) - (pong.ai.y + pong.ai.h / 2)) * 4;
      }

      if (pong.ball.x < -30) {
        pong.aiScore++;
        resetPongBall(1);
      }
      if (pong.ball.x > GAME_WIDTH + 30) {
        pong.playerScore++;
        arcade.high.pong = Math.max(arcade.high.pong, pong.playerScore);
        localStorage.setItem("high_pong", String(arcade.high.pong));
        resetPongBall(-1);
      }
      if (pong.playerScore >= 7 || pong.aiScore >= 7) pong.over = true;
    }

    function drawPong() {
      drawBackground();
      for (let y = 20; y < GAME_HEIGHT - 20; y += 28) {
        ctx.fillStyle = "rgba(255,255,255,0.45)";
        ctx.fillRect(GAME_WIDTH / 2 - 3, y, 6, 16);
      }
      ctx.fillStyle = "#55ff99";
      ctx.fillRect(pong.player.x, pong.player.y, pong.player.w, pong.player.h);
      ctx.fillStyle = "#ff5577";
      ctx.fillRect(pong.ai.x, pong.ai.y, pong.ai.w, pong.ai.h);
      ctx.fillStyle = "#ffee55";
      ctx.fillRect(pong.ball.x, pong.ball.y, pong.ball.size, pong.ball.size);
      drawText(String(pong.playerScore), GAME_WIDTH / 2 - 85, 70, 58, "center", "#ffffff");
      drawText(String(pong.aiScore), GAME_WIDTH / 2 + 85, 70, 58, "center", "#ffffff");
      drawText("PONG • FIRST TO 7 • ESC MENU", GAME_WIDTH / 2, 505, 18, "center", "#ffffff");
      if (pong.over) drawGameOver(pong.playerScore, pong.playerScore > pong.aiScore ? "YOU WIN" : "PONG");
    }

    function drawGameOver(score, title) {
      ctx.fillStyle = "rgba(0, 0, 0, 0.72)";
      ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);
      drawText(title === "YOU WIN" ? "YOU WIN!" : "GAME OVER", GAME_WIDTH / 2, 205, 58, "center", title === "YOU WIN" ? "#55ff99" : "#ff5577");
      drawText(title, GAME_WIDTH / 2, 270, 28, "center", "#ffee55");
      drawText(`SCORE: ${score}`, GAME_WIDTH / 2, 325, 26, "center", "#ffffff");
      drawText("ENTER / SPACE RESTART • ESC MENU", GAME_WIDTH / 2, 385, 24, "center", "#55ff99");
    }

    let lastTime = performance.now();
    function gameLoop(now) {
      const dt = Math.min((now - lastTime) / 1000, 0.033);
      lastTime = now;
      const pad = getGamepadInput();

      if (arcade.state === "menu") updateMenu(dt, pad);
      if (arcade.state === "invaders") updateInvaders(dt, pad);
      if (arcade.state === "snake") updateSnake(dt, pad);
      if (arcade.state === "pong") updatePong(dt, pad);

      if (arcade.state === "menu") drawMenu();
      if (arcade.state === "invaders") drawInvaders();
      if (arcade.state === "snake") drawSnake();
      if (arcade.state === "pong") drawPong();

      for (const key in justPressed) delete justPressed[key];
      requestAnimationFrame(gameLoop);
    }

    createStars();
    requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
